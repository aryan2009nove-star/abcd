<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry 🥺</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Comic Sans MS', cursive;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    text-align: center;
    color: #fff;
}

.container {
    padding: 20px;
}

h1 {
    font-size: 40px;
    margin-top: 20px;
}

p {
    font-size: 20px;
}

img {
    width: 250px;
    height: auto;
    border-radius: 20px;
    margin: 15px;
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
}

.button {
    background: #ff4d6d;
    border: none;
    padding: 12px 25px;
    font-size: 18px;
    color: white;
    border-radius: 25px;
    cursor: pointer;
    margin-top: 20px;
}

.button:hover {
    background: #ff1e4d;
}

.heart {
    font-size: 30px;
    animation: heartbeat 1s infinite;
}

@keyframes heartbeat {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}
</style>

</head>

<body>

<div class="container">

    <h1>I'm Really Sorry cutiii🥺 </h1>

    <p>
        Mujhse galti ho gayi... 😔 <br>
        Please mujhe maaf kar do 🥺 <br>
        Aap meri life mein bohot special ho isliye sorry 🥺
        scroll down ⬇
    </p>

    <!-- Your Girl Image -->
    <img src="girl.jpg" alt="Your Girl">

    <!-- Sorry Image -->
    <img src="sorry.jpg" alt="Sorry Image">

    <div class="heart">🥺 😔 🥺</div>

    <br>

    <button class="button" onclick="showMessage()">Click Here 💌</button>

</div>

<script>
function showMessage() {
    alert("Please aap mujhe , maaf kar do na 🥺");
}
</script>

</body>
</html>
